version: "3.8"

services:
  # ─── 🐘 DATABASE ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres_container
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - presence

  # ─── 🚀 BACKEND EXPRESS + PRISMA ─────────────
  backend:
    image: registry.gitlab.com/victorino.hairun/presence/staging/api:dev
    container_name: backend_container
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - presence

  studio: 
    image: registry.gitlab.com/victorino.hairun/presence/staging/api:dev
    command: sh -c "npx prisma studio --hostname 0.0.0.0 --port 5555"
    container_name: backend_studio
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - presence
  # ─── 🌐 FRONTEND REACT + NGINX ─────────────
  frontend:
    image: registry.gitlab.com/victorino.hairun/presence/staging/front:dev
    container_name: frontend_container
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - presence

volumes:
  pgdata:

networks:
  presence:
