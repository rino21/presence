apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio
  namespace: presence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: studio

  template:
    metadata:
      labels:
        app: studio

    spec:
      containers:
        - name: studio
          image: registry.gitlab.com/victorino.hairun/presence/staging/api:dev

          command:
            - sh
            - -c
            - npx prisma studio --hostname 0.0.0.0 --port 5555

          ports:
            - containerPort: 5555

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: presence-secret
                  key: DATABASE_URL